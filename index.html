<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex,nofollow" />
  <title>Client Dashboards</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f7f7f8; color: #0f172a; margin: 0; padding: 48px 24px; }
    .wrap { max-width: 720px; margin: 0 auto; }
    h1 { font-size: 22px; margin: 0 0 4px; }
    p.sub { color: #64748b; margin: 0 0 24px; font-size: 14px; }
    ul { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 8px; }
    li a { display: block; padding: 14px 18px; background: #fff; border: 1px solid #e5e7eb;
      border-radius: 10px; text-decoration: none; color: #0f172a;
      transition: border-color 0.15s, box-shadow 0.15s; }
    li a:hover { border-color: #4f46e5; box-shadow: 0 0 0 3px #eef2ff; }
    li a strong { display: block; font-size: 15px; margin-bottom: 2px; }
    li a span { color: #64748b; font-size: 13px; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Client Dashboards</h1>
    <p class="sub">Performance dashboards by client account.</p>
    <ul>
      <li><a href="vyve-meta/">
        <strong>Vyve Wellness — Meta Ads</strong>
        <span>Campaign-level daily performance, weekly aggregation</span>
      </a></li>
    </ul>
  </div>
</body>
</html>
